{{- if .Values.networkPolicy.enabled }}
---
# Default deny all ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sbc.fullname" . }}-default-deny
  labels:
    {{- include "sbc.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "sbc.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress

---
# Allow SIP traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sbc.fullname" . }}-allow-sip
  labels:
    {{- include "sbc.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "sbc.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: UDP
          port: 5060
        - protocol: TCP
          port: 5060
        - protocol: TCP
          port: 5061

---
# Allow API access from within namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sbc.fullname" . }}-allow-api
  labels:
    {{- include "sbc.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "sbc.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.apiService.httpPort }}
        - protocol: TCP
          port: {{ .Values.apiService.httpsPort }}

{{- if .Values.metrics.enabled }}
---
# Allow Prometheus scraping
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sbc.fullname" . }}-allow-prometheus
  labels:
    {{- include "sbc.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "sbc.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.prometheusNamespace }}
      ports:
        - protocol: TCP
          port: {{ .Values.metrics.port }}
{{- end }}
{{- end }}
