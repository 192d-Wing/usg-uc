apiVersion: v1
kind: Namespace
metadata:
  name: sbc-system
  labels:
    app.kubernetes.io/part-of: usg-uc
    # Relaxed to 'privileged' for init container NET_ADMIN (policy routing).
    # Production deployments should use 'restricted' with a network plugin
    # that handles source-based routing natively.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline
