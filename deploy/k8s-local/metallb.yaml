# MetalLB configuration — general-purpose LAN pool
# With DHCP macvlan, the SBC pod gets LAN IPs directly on its interfaces.
# This pool is available for any Services that need a LoadBalancer IP.
# The address range should be outside the DHCP server's lease range.
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: sbc-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.0.230-192.168.0.239
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: sbc-l2-advert
  namespace: metallb-system
spec:
  ipAddressPools:
    - sbc-pool
