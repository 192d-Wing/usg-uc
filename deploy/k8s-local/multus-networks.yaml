# Multus NetworkAttachmentDefinitions — three additional interfaces per SBC pod
# Uses macvlan on the Kind node's macvlan trunk with static IPs from the LAN.
# Addresses are chosen from the upper end of the LAN subnet to avoid
# conflicts with DHCP leases and other devices.
---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: sbc-inside
  namespace: sbc-system
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "macvlan",
      "master": "eth0",
      "mode": "bridge",
      "ipam": {
        "type": "host-local",
        "subnet": "192.168.0.0/24",
        "rangeStart": "192.168.0.240",
        "rangeEnd": "192.168.0.240",
        "gateway": "192.168.0.1"
      }
    }
---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: sbc-outside
  namespace: sbc-system
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "macvlan",
      "master": "eth0",
      "mode": "bridge",
      "ipam": {
        "type": "host-local",
        "subnet": "192.168.0.0/24",
        "rangeStart": "192.168.0.241",
        "rangeEnd": "192.168.0.241",
        "gateway": "192.168.0.1"
      }
    }
---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: sbc-oobm
  namespace: sbc-system
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "macvlan",
      "master": "eth0",
      "mode": "bridge",
      "ipam": {
        "type": "host-local",
        "subnet": "192.168.0.0/24",
        "rangeStart": "192.168.0.242",
        "rangeEnd": "192.168.0.242",
        "gateway": "192.168.0.1"
      }
    }
