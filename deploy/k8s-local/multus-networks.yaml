# Multus NetworkAttachmentDefinitions — three additional interfaces per SBC pod
# Uses macvlan on the kind node's eth0 with static IPs from LAN subnet
---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: sbc-inside
  namespace: sbc-system
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "macvlan",
      "master": "eth0",
      "mode": "bridge",
      "ipam": {
        "type": "host-local",
        "subnet": "192.168.44.0/24",
        "rangeStart": "192.168.44.200",
        "rangeEnd": "192.168.44.200",
        "gateway": "192.168.44.1"
      }
    }
---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: sbc-outside
  namespace: sbc-system
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "macvlan",
      "master": "eth0",
      "mode": "bridge",
      "ipam": {
        "type": "host-local",
        "subnet": "192.168.44.0/24",
        "rangeStart": "192.168.44.201",
        "rangeEnd": "192.168.44.201",
        "gateway": "192.168.44.1"
      }
    }
---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: sbc-oobm
  namespace: sbc-system
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "macvlan",
      "master": "eth0",
      "mode": "bridge",
      "ipam": {
        "type": "host-local",
        "subnet": "192.168.44.0/24",
        "rangeStart": "192.168.44.202",
        "rangeEnd": "192.168.44.202",
        "gateway": "192.168.44.1"
      }
    }
