apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sbc-daemon
  namespace: sbc-system
  labels:
    app.kubernetes.io/name: sbc
    app.kubernetes.io/component: daemon
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: sbc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sbc
        app.kubernetes.io/component: daemon
      annotations:
        k8s.v1.cni.cncf.io/networks: |
          [
            {"name": "sbc-inside",  "interface": "net1"},
            {"name": "sbc-outside", "interface": "net2"},
            {"name": "sbc-oobm",    "interface": "net3"}
          ]
    spec:
      serviceAccountName: sbc-daemon
      terminationGracePeriodSeconds: 60
      nodeSelector:
        node-role.kubernetes.io/sbc: "true"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/sbc
                    operator: Exists
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sbc
          image: sbc-daemon:local
          imagePullPolicy: Never
          args: ["-c", "/etc/sbc/config.toml"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          ports:
            - name: sip-udp
              containerPort: 5060
              protocol: UDP
            - name: sip-tcp
              containerPort: 5060
              protocol: TCP
            - name: sip-tls
              containerPort: 5061
              protocol: TCP
            - name: api
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /etc/sbc
              readOnly: true
            - name: data
              mountPath: /var/lib/sbc
            - name: logs
              mountPath: /var/log/sbc
      volumes:
        - name: config
          configMap:
            name: sbc-config
        - name: data
          emptyDir: {}
        - name: logs
          emptyDir: {}
