apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sbc-daemon
  namespace: sbc-system
  labels:
    app.kubernetes.io/name: sbc
    app.kubernetes.io/component: daemon
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: sbc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sbc
        app.kubernetes.io/component: daemon
      annotations:
        k8s.v1.cni.cncf.io/networks: |
          [
            {"name": "sbc-inside",  "interface": "net1"},
            {"name": "sbc-outside", "interface": "net2"},
            {"name": "sbc-oobm",    "interface": "net3"}
          ]
    spec:
      serviceAccountName: sbc-daemon
      terminationGracePeriodSeconds: 60
      nodeSelector:
        node-role.kubernetes.io/sbc: "true"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/sbc
                    operator: Exists
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: route-setup
          image: busybox:1.36
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: true
            capabilities:
              drop: ["ALL"]
              add: ["NET_ADMIN"]
          command: ["sh", "-c"]
          env:
            - name: LAN_SUBNET
              valueFrom:
                configMapKeyRef:
                  name: sbc-network
                  key: lan_subnet
            - name: LAN_GATEWAY
              valueFrom:
                configMapKeyRef:
                  name: sbc-network
                  key: lan_gateway
          args:
            - |
              # Policy routing: traffic sourced from macvlan (DHCP) IPs exits via
              # the LAN gateway instead of the default kindnet route.
              # DHCP leases on net1/net2/net3 add default routes via the LAN
              # gateway to the main table, which would hijack cluster traffic.
              # Remove those defaults and keep only the kindnet (eth0) default.
              ETH0_GW=$(ip route show default dev eth0 | awk '{print $3; exit}')
              ip route del default via "$LAN_GATEWAY" dev net1 2>/dev/null || true
              ip route del default via "$LAN_GATEWAY" dev net2 2>/dev/null || true
              ip route del default via "$LAN_GATEWAY" dev net3 2>/dev/null || true

              # Policy routing: traffic sourced from macvlan (DHCP) IPs exits via
              # the LAN gateway instead of the default kindnet route.
              ip rule add from "$LAN_SUBNET" table 100
              ip route add default via "$LAN_GATEWAY" table 100
              echo "Policy route: ${LAN_SUBNET} → gw ${LAN_GATEWAY} (table 100)"
              echo "Default route: eth0 → gw ${ETH0_GW} (main table)"
      containers:
        - name: sbc
          image: sbc-daemon:local
          imagePullPolicy: Never
          args: ["-c", "/etc/sbc/config.toml"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          ports:
            - name: sip-udp
              containerPort: 5060
              protocol: UDP
            - name: sip-tcp
              containerPort: 5060
              protocol: TCP
            - name: sip-tls
              containerPort: 5061
              protocol: TCP
            - name: api
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /etc/sbc
              readOnly: true
            - name: data
              mountPath: /var/lib/sbc
            - name: logs
              mountPath: /var/log/sbc
      volumes:
        - name: config
          configMap:
            name: sbc-config
        - name: data
          emptyDir: {}
        - name: logs
          emptyDir: {}
