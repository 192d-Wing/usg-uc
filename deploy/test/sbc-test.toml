# SBC test configuration — relaxed security for local stress testing
#
# Usage: docker compose -f deploy/test/docker-compose.yml up

[general]
instance_name = "sbc-test"
max_calls = 5000
max_registrations = 10000

[transport]
udp_listen = ["0.0.0.0:5060"]

[media]
default_mode = "Relay"
codecs = ["G711Ulaw", "G711Alaw", "G722"]
rtp_port_min = 16384
rtp_port_max = 20000

[media.srtp]
required = false

[rate_limit]
enabled = true
global_rps = 50000
per_ip_rps = 10000
per_user_rps = 5000
burst_multiplier = 5.0

[logging]
level = "info"
format = "text"
output = "stdout"

# Test routing: route all calls to a loopback UAS
[routing]
use_dial_plan = true
max_failover_attempts = 1
default_trunk_group = "loopback"

[[dial_plans]]
id = "stress-test"
name = "Stress Test Plan"
active = true

  [[dial_plans.entries]]
  direction = "both"
  pattern_type = "any"
  pattern_value = ""
  trunk_group = "loopback"
  priority = 100

[[trunk_groups]]
id = "loopback"
name = "Loopback Test Target"
strategy = "round_robin"

  [[trunk_groups.trunks]]
  id = "loopback-1"
  host = "127.0.0.1"
  port = 5080
  protocol = "udp"
  max_calls = 5000
