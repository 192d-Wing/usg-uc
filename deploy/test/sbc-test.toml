# SBC test configuration — dual-interface deployment
#
# Signaling: 172.28.1.10 (eth0 — sbc-signaling network)
# Media:     172.28.2.10 (eth1 — sbc-media network)
#
# Usage: docker compose -f deploy/test/docker-compose.yml up

[general]
instance_name = "sbc-test"
max_calls = 5000
max_registrations = 10000

[transport]
# Bind SIP signaling to the signaling interface
udp_listen = ["172.28.1.10:5060"]
tcp_listen = ["172.28.1.10:5060"]
tls_listen = ["172.28.1.10:5061"]

# Dual-interface: separate IPs for signaling vs media
signaling_ip = "172.28.1.10"
media_ip = "172.28.2.10"

# External IP (set if behind NAT, otherwise auto-detected)
# external_ip = "203.0.113.10"

# REST API on signaling interface
api_listen = "172.28.1.10:8080"

tcp_timeout_secs = 30
tcp_idle_timeout_secs = 300

[media]
default_mode = "Relay"
codecs = ["G711Ulaw", "G711Alaw", "G722"]
rtp_port_min = 16384
rtp_port_max = 20000

[media.srtp]
required = false

[rate_limit]
enabled = true
global_rps = 50000
per_ip_rps = 10000
per_user_rps = 5000
burst_multiplier = 5.0

[logging]
level = "info"
format = "text"
output = "stdout"

# Test routing: route all calls to a loopback UAS
[routing]
use_dial_plan = true
max_failover_attempts = 1
default_trunk_group = "loopback"

[[dial_plans]]
id = "stress-test"
name = "Stress Test Plan"
active = true

  [[dial_plans.entries]]
  direction = "both"
  pattern_type = "any"
  pattern_value = ""
  trunk_group = "loopback"
  priority = 100

[[trunk_groups]]
id = "loopback"
name = "Loopback Test Target"
strategy = "round_robin"

  [[trunk_groups.trunks]]
  id = "loopback-1"
  host = "172.28.1.20"
  port = 5080
  protocol = "udp"
  max_calls = 5000
