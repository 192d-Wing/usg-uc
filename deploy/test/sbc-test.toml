# SBC test configuration — three-zone deployment on single NIC with IP aliases
#
# Zone topology (all on en0 with alias IPs):
#   signaling — 192.168.44.129 — SIP signaling (trunks, registrations)
#   media     — 192.168.44.130 — RTP/SRTP media streams
#   oobm      — 192.168.44.131 — Out-of-Band Management (REST API, gRPC)
#
# Setup aliases before starting:
#   sudo ifconfig en0 alias 192.168.44.129 255.255.255.0
#   sudo ifconfig en0 alias 192.168.44.130 255.255.255.0
#   sudo ifconfig en0 alias 192.168.44.131 255.255.255.0
#
# Remove aliases when done:
#   sudo ifconfig en0 -alias 192.168.44.129
#   sudo ifconfig en0 -alias 192.168.44.130
#   sudo ifconfig en0 -alias 192.168.44.131

[general]
instance_name = "sbc-test"
max_calls = 5000
max_registrations = 10000
default_internal_zone = "signaling"

# ── Zone Definitions ──────────────────────────────────────

[[zones]]
name = "signaling"
signaling_interface = "en0"
media_interface = "en0"
external_ip = "stun"

[[zones]]
name = "media"
signaling_interface = "en0"
media_interface = "en0"

[[zones]]
name = "oobm"
signaling_interface = "en0"
media_interface = "en0"

# ── Transport ─────────────────────────────────────────────

[transport]
# SIP on signaling alias
udp_listen = ["192.168.44.129:5060"]
tcp_listen = ["192.168.44.129:5060"]
tls_listen = ["192.168.44.129:5061"]

# API/UI on OOBM alias only
api_listen = "192.168.44.131:8080"

stun_refresh_interval_secs = 300
tcp_timeout_secs = 30
tcp_idle_timeout_secs = 300

# ── Media ─────────────────────────────────────────────────

[media]
default_mode = "Relay"
codecs = ["G711Ulaw", "G711Alaw", "G722"]
rtp_port_min = 16384
rtp_port_max = 20000

[media.srtp]
required = false

# ── Rate Limiting ─────────────────────────────────────────

[rate_limit]
enabled = true
global_rps = 50000
per_ip_rps = 10000
per_user_rps = 5000
burst_multiplier = 5.0

[logging]
level = "info"
format = "text"
output = "stdout"

# ── Trunk Groups ──────────────────────────────────────────

[[trunk_groups]]
id = "loopback"
name = "Loopback Test Target"
zone = "signaling"
strategy = "round_robin"

  [[trunk_groups.trunks]]
  id = "loopback-1"
  host = "127.0.0.1"
  port = 5080
  protocol = "udp"
  max_calls = 5000
