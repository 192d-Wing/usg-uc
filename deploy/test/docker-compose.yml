# USG SBC Stress Test Environment — Dual Interface
#
# Network topology:
#   sbc-signaling (172.28.1.0/24) — SIP signaling + API
#   sbc-media     (172.28.2.0/24) — RTP media streams
#
# The SBC binds SIP to the signaling interface and RTP to the media interface.
# This mirrors production deployments where signaling and media are isolated.
#
# Usage:
#   docker compose -f deploy/test/docker-compose.yml build
#   docker compose -f deploy/test/docker-compose.yml up
#
# Monitor:
#   curl http://localhost:8080/api/v1/system/stats
#   curl http://localhost:8080/api/v1/trunk-health

services:
  # ── SBC Under Test ─────────────────────────────────────────────
  sbc:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: sbc-test
    ports:
      - "5060:5060/udp"        # SIP signaling
      - "5060:5060/tcp"
      - "5061:5061/tcp"        # SIP TLS
      - "8080:8080/tcp"        # REST API
      - "16384-16484:16384-16484/udp"  # RTP media
    volumes:
      - ./sbc-test.toml:/etc/sbc/config.toml:ro
    networks:
      sbc-signaling:
        ipv4_address: 172.28.1.10
      sbc-media:
        ipv4_address: 172.28.2.10
    healthcheck:
      test: ["CMD", "/usr/local/bin/sbc-cli", "health", "--quiet"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── SIPp UAS (answers calls) ───────────────────────────────────
  sipp-uas:
    image: ctaloi/sipp:latest
    container_name: sipp-uas
    command: >
      -sn uas
      -p 5080
      -mi 172.28.2.20
      -trace_err
      -trace_stat
      -fd 1s
      -bg
    networks:
      sbc-signaling:
        ipv4_address: 172.28.1.20
      sbc-media:
        ipv4_address: 172.28.2.20
    depends_on:
      sbc:
        condition: service_healthy

  # ── SIPp UAC (generates load) ──────────────────────────────────
  #
  # Adjust -r (rate), -l (concurrent), -m (total calls) as needed.
  # Default: 10 calls/sec, 100 concurrent, 1000 total calls
  sipp-uac:
    image: ctaloi/sipp:latest
    container_name: sipp-uac
    command: >
      172.28.1.10:5060
      -sn uac
      -r 10
      -rp 1000
      -l 100
      -m 1000
      -mi 172.28.2.30
      -p 5070
      -trace_err
      -trace_stat
      -fd 1s
      -d 5000
      -recv_timeout 10000
    networks:
      sbc-signaling:
        ipv4_address: 172.28.1.30
      sbc-media:
        ipv4_address: 172.28.2.30
    depends_on:
      sbc:
        condition: service_healthy
      sipp-uas:
        condition: service_started

networks:
  sbc-signaling:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.1.0/24
  sbc-media:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.2.0/24
