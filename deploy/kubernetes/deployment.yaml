# USG Unified Communications SBC - Deployment
#
# ## NIST 800-53 Rev5 Controls
# - **CM-2**: Baseline Configuration
# - **CM-7**: Least Functionality (minimal container)
# - **SC-28**: Protection of Information at Rest (no secrets in env)
# - **SI-6**: Security Function Verification (health checks)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sbc-daemon
  namespace: sbc-system
  labels:
    app.kubernetes.io/name: sbc
    app.kubernetes.io/component: daemon
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sbc
      app.kubernetes.io/component: daemon
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sbc
        app.kubernetes.io/component: daemon
      annotations:
        # Force rollout on config change
        checksum/config: "{{ include (print $.Template.BasePath \"/configmap.yaml\") . | sha256sum }}"
    spec:
      serviceAccountName: sbc-daemon
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sbc-daemon
          image: sbc-daemon:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: sip-udp
              containerPort: 5060
              protocol: UDP
            - name: sip-tcp
              containerPort: 5060
              protocol: TCP
            - name: sip-tls
              containerPort: 5061
              protocol: TCP
            - name: http-api
              containerPort: 8080
              protocol: TCP
            - name: https-api
              containerPort: 8443
              protocol: TCP
          args:
            - "-c"
            - "/etc/sbc/config.toml"
            - "-f"
          volumeMounts:
            - name: config
              mountPath: /etc/sbc
              readOnly: true
            - name: data
              mountPath: /var/lib/sbc
            - name: logs
              mountPath: /var/log/sbc
            - name: certs
              mountPath: /etc/sbc/certs
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: http-api
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http-api
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/live
              port: http-api
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
      volumes:
        - name: config
          configMap:
            name: sbc-config
        - name: data
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: certs
          secret:
            secretName: sbc-certs
            optional: true
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: sbc
                    app.kubernetes.io/component: daemon
                topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 60
