[package]
name = "uc-storage"
description = "Storage backends for USG SBC state persistence"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true

[features]
default = []
redis = ["dep:redis", "dep:bb8", "dep:bb8-redis"]
postgres = ["dep:sqlx", "dep:chrono"]

[dependencies]
# Async runtime
tokio.workspace = true

# Serialization
serde.workspace = true
serde_json.workspace = true

# Logging
tracing.workspace = true

# Error handling
thiserror.workspace = true

# Bytes handling
bytes.workspace = true

# Redis (optional)
redis = { version = "0.27", features = ["tokio-comp", "cluster-async"], optional = true }
bb8 = { version = "0.8", optional = true }
bb8-redis = { version = "0.17", optional = true }

# PostgreSQL (optional)
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "chrono"], optional = true }
chrono = { version = "0.4", optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
tracing-subscriber.workspace = true

[lints]
workspace = true
