[package]
name = "uc-t38"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "T.38 fax relay protocol for USG SBC (RFC 4612)"
repository = "https://github.com/usg/usg-uc"
keywords = ["t38", "fax", "sip", "voip", "sbc"]
categories = ["network-programming", "multimedia"]

[dependencies]
# Internal dependencies
uc-types = { path = "../uc-types" }

# Error handling
thiserror = "2"

# Serialization
serde = { version = "1", features = ["derive"] }

# Async runtime
tokio = { version = "1", features = ["net", "sync", "time"] }

# Logging
tracing = "0.1"

# Bytes handling
bytes = "1"

# Duration serialization
humantime-serde = "1"

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"
