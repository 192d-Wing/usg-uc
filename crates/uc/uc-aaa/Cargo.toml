[package]
name = "uc-aaa"
description = "Authentication, Authorization, and Accounting for USG SBC"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true

[features]
default = []
radius = ["dep:radius-proto"]
diameter = ["dep:diameter"]

[dependencies]
# Async runtime
tokio.workspace = true

# Serialization
serde.workspace = true
serde_json.workspace = true

# Logging
tracing.workspace = true

# Error handling
thiserror.workspace = true

# Bytes handling
bytes.workspace = true

# RADIUS protocol (RFC 2865, RFC 2866) - using usg-radius project
radius-proto = { git = "https://gitlab.com/192d-wing/usg-radius.git", optional = true }

# Diameter protocol (RFC 6733)
diameter = { version = "0.7", optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
tracing-subscriber.workspace = true

[lints]
workspace = true
