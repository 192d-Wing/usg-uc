[package]
name = "uc-telemetry"
description = "OpenTelemetry integration for USG SBC distributed tracing and metrics"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true

[features]
default = ["tracing"]
tracing = ["dep:tracing-opentelemetry"]
metrics = ["dep:opentelemetry-prometheus"]
otlp = ["opentelemetry-otlp"]
jaeger = []  # Jaeger is deprecated, use OTLP with Jaeger backend

[dependencies]
# Async runtime
tokio.workspace = true

# Logging
tracing.workspace = true
tracing-subscriber.workspace = true

# Serialization
serde.workspace = true

# Error handling
thiserror.workspace = true

# OpenTelemetry core
opentelemetry = { version = "0.31", features = ["trace", "metrics"] }
opentelemetry_sdk = { version = "0.31", features = ["trace", "metrics", "rt-tokio"] }

# Tracing integration (optional)
tracing-opentelemetry = { version = "0.32", optional = true }

# OTLP exporter (optional)
opentelemetry-otlp = { version = "0.31", features = ["trace", "metrics", "grpc-tonic"], optional = true }

# Prometheus metrics (optional)
opentelemetry-prometheus = { version = "0.31", optional = true }

# HTTP server for prometheus endpoint
axum.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
tracing-subscriber.workspace = true

[lints]
workspace = true
