[package]
name = "uc-transport"
description = "Transport layer abstraction for UDP, TCP, TLS, and WebSocket protocols"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true

[features]
default = ["udp", "tcp", "tls"]
udp = []
tcp = []
tls = ["dep:rustls", "dep:tokio-rustls", "dep:rustls-pki-types", "dep:arc-swap"]
websocket = ["dep:tokio-tungstenite", "dep:futures-util"]
sctp = ["dep:crc32c", "dep:rand"]  # SCTP transport (RFC 9260)

[dependencies]
uc-types.workspace = true
uc-crypto.workspace = true
tokio.workspace = true
thiserror.workspace = true
tracing.workspace = true
bytes.workspace = true
socket2.workspace = true

# TLS support
rustls = { workspace = true, optional = true }
tokio-rustls = { version = "0.26", optional = true }
rustls-pki-types = { workspace = true, optional = true }
arc-swap = { version = "1.8", optional = true }

# WebSocket support
tokio-tungstenite = { version = "0.28", optional = true }
futures-util = { version = "0.3", optional = true }

# SCTP support
crc32c = { version = "0.6", optional = true }
rand = { version = "0.9", optional = true }

[dev-dependencies]
tempfile = "3"

[lints]
workspace = true
