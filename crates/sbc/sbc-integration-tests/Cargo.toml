[package]
name = "sbc-integration-tests"
description = "Integration tests for USG SBC"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lints]
workspace = true

[features]
default = []
cluster = ["uc-cluster", "uc-discovery", "uc-storage", "proto-registrar/storage"]
redis = ["cluster", "uc-storage/redis"]
postgres = ["cluster", "uc-storage/postgres"]
grpc = ["sbc-grpc-api", "tonic", "prost", "prost-types", "tokio-stream"]
grpc-reflection = ["grpc", "sbc-grpc-api/reflection"]
grpc-cluster = ["grpc", "cluster", "sbc-grpc-api/cluster"]

[dependencies]
# SBC crates to test
uc-types.workspace = true
sbc-config = { path = "../sbc-config", features = ["cluster"] }
uc-health.workspace = true
uc-metrics.workspace = true
uc-policy.workspace = true
uc-routing.workspace = true
uc-cdr.workspace = true
uc-api.workspace = true

# Cluster crates (optional)
uc-cluster = { path = "../../uc/uc-cluster", optional = true }
uc-discovery = { path = "../../uc/uc-discovery", optional = true }
uc-storage = { path = "../../uc/uc-storage", optional = true }
proto-registrar = { path = "../../proto/proto-registrar", optional = true }

# Test utilities
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "time"] }

# gRPC dependencies (optional)
sbc-grpc-api = { workspace = true, optional = true }
tonic = { workspace = true, optional = true }
prost = { version = "0.14", optional = true }
prost-types = { version = "0.14", optional = true }
tokio-stream = { version = "0.1", optional = true }

[lib]
name = "sbc_integration_tests"
path = "src/lib.rs"
