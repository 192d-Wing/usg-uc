[package]
name = "sbc-daemon"
description = "Main SBC daemon process"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true

[lints]
workspace = true

[features]
default = []
grpc = ["dep:sbc-grpc-api", "dep:tonic", "dep:tonic-prost", "dep:prost", "dep:prost-types", "dep:tokio-stream"]
grpc-reflection = ["grpc", "sbc-grpc-api?/reflection", "dep:tonic-reflection"]
cluster = ["uc-cluster", "uc-discovery", "uc-storage", "uc-state-sync", "proto-registrar/storage", "sbc-config/cluster", "sbc-grpc-api?/cluster"]
redis = ["uc-storage/redis"]
postgres = ["uc-storage/postgres"]
full = ["cluster", "redis", "postgres", "grpc", "grpc-reflection"]

[dependencies]
uc-types.workspace = true
sbc-config = { path = "../sbc-config", features = ["telemetry"] }
uc-health.workspace = true
uc-metrics.workspace = true
uc-transport.workspace = true
uc-telemetry.workspace = true
proto-sip.workspace = true
proto-transaction.workspace = true
proto-dialog.workspace = true
proto-b2bua.workspace = true
proto-registrar.workspace = true
proto-rtp.workspace = true
proto-srtp.workspace = true
proto-dtls.workspace = true
uc-media-engine.workspace = true
uc-codecs.workspace = true
proto-stun.workspace = true
proto-turn.workspace = true
proto-ice.workspace = true
uc-api.workspace = true
uc-dos-protection.workspace = true
uc-routing.workspace = true

# Clustering dependencies (optional)
uc-cluster = { workspace = true, optional = true }
uc-discovery = { workspace = true, optional = true }
uc-storage = { workspace = true, optional = true }
uc-state-sync = { workspace = true, optional = true }
tokio.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
bytes.workspace = true
axum.workspace = true
tower.workspace = true
tower-http.workspace = true
serde.workspace = true
serde_json.workspace = true
rustls.workspace = true
tokio-rustls.workspace = true
rustls-pki-types.workspace = true
hyper.workspace = true
hyper-util.workspace = true

# gRPC dependencies (optional)
sbc-grpc-api = { workspace = true, optional = true }
tonic = { workspace = true, optional = true }
tonic-prost = { version = "0.14", optional = true }
tonic-reflection = { workspace = true, optional = true }
prost = { version = "0.14", optional = true }
prost-types = { version = "0.14", optional = true }
tokio-stream = { version = "0.1", optional = true }

[[bin]]
name = "sbc-daemon"
path = "src/main.rs"
