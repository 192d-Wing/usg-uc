[package]
name = "client-audio"
description = "Audio pipeline for USG SIP Soft Client"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = []
# Enable Opus FFI codec (requires libopus: brew install opus)
opus-ffi = ["uc-codecs/opus-ffi"]

[dependencies]
client-types = { path = "../client-types" }
uc-codecs.workspace = true
proto-rtp.workspace = true
proto-srtp.workspace = true
thiserror.workspace = true
tracing.workspace = true
bytes.workspace = true

# Audio
cpal.workspace = true
ringbuf.workspace = true

# WAV file loading for Music on Hold
hound = "3.5"

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
criterion.workspace = true

[[bench]]
name = "audio_hotpaths"
harness = false

[lints]
workspace = true
