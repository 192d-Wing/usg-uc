# USG SIP Soft Client - Default Settings
#
# This file contains the default configuration for the SIP soft client.
# User-specific settings will be stored in %APPDATA%\USG\SIP Soft Client\settings.toml
#
# SECURITY NOTE: This client uses smart card authentication only.
# No password-based authentication is supported for CNSA 2.0 compliance.

[general]
# Application behavior
start_minimized = false
minimize_to_tray = true
start_with_windows = false
check_for_updates = false

# Logging level: "error", "warn", "info", "debug", "trace"
log_level = "info"

[ui]
# Theme: "dark" or "light"
theme = "dark"

# Window behavior
always_on_top = false
show_call_notifications = true
show_registration_notifications = true

# Confirmation dialogs
confirm_on_exit = true
confirm_on_call_transfer = true

[network]
# Transport preference: "tls_only" (required for CNSA 2.0)
transport = "tls_only"

# TLS settings (CNSA 2.0 compliant)
tls_min_version = "1.3"
tls_verify_certificates = true

# NAT traversal
use_ice = true
use_stun = true
use_turn = false

# Default STUN server (configure your own for production)
# stun_server = "stun.example.gov:3478"

# Timeout settings (milliseconds)
registration_timeout_ms = 30000
call_setup_timeout_ms = 60000

[audio]
# Audio settings
# Device selection is done through the GUI

# Codec preferences (in order of preference)
# CNSA 2.0 Note: All media is encrypted with AES-256-GCM via SRTP
codec_preference = ["opus", "g722", "g711_ulaw", "g711_alaw"]

# Acoustic echo cancellation
enable_aec = true

# Automatic gain control
enable_agc = true

# Noise suppression
enable_noise_suppression = true

# Jitter buffer settings
jitter_buffer_min_ms = 40
jitter_buffer_max_ms = 200
jitter_buffer_target_ms = 60

# DTMF mode: "rtp_event" (RFC 2833) or "inband"
dtmf_mode = "rtp_event"

[certificate]
# Smart card / Certificate settings
# The client will use certificates from the Windows Certificate Store

# Selection mode: "auto_select", "prompt_user", "specific_certificate"
selection_mode = "auto_select"

# Store name (Windows): "MY" for personal certificates
store_name = "MY"

# Preferred key algorithm for auto-selection (CNSA 2.0 prefers P-384)
preferred_key_algorithm = "ECDSA P-384"

# Required key usage for certificate selection
required_key_usage = "Client Authentication"

# Specific certificate thumbprint (only used if selection_mode = "specific_certificate")
# certificate_thumbprint = ""

[sip]
# SIP User Agent settings
# Configure these for your SIP server

# User agent string
user_agent = "USG SIP Soft Client/0.1.0"

# Session timers (RFC 4028)
enable_session_timers = true
session_expires_secs = 1800
min_session_expires_secs = 90

# Registration settings
registration_expires_secs = 3600
register_on_startup = true

# Call settings
enable_early_media = true
enable_100rel = true

# Hold/Resume method: "sendonly" or "inactive"
hold_method = "sendonly"

[privacy]
# Privacy settings

# Call history
save_call_history = true
call_history_max_entries = 1000

# Contact storage
save_contacts_locally = true

# Clear sensitive data on exit
clear_credentials_on_exit = true

# Note: All credential data is automatically zeroized on drop
# using the zeroize crate for memory safety.
