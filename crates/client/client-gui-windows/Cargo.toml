[package]
name = "client-gui-windows"
description = "Windows GUI for USG SIP Soft Client"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
build = "build.rs"

# This crate is Windows-only. Other platforms have separate UI crates:
# - client-gui-macos (planned)
# - client-gui-linux (planned)
# - client-gui-android (planned)
# - client-gui-ios (planned)

# All dependencies are Windows-only to avoid pulling in GTK/Linux dependencies
[target.'cfg(windows)'.dependencies]
client-types = { path = "../client-types" }
client-core = { path = "../client-core" }
client-audio = { path = "../client-audio" }
tokio.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true

# Native Windows GUI
native-windows-gui = { version = "1.0", features = ["all"] }
native-windows-derive = "1.0"

# Windows integration
rfd.workspace = true
winrt-notification.workspace = true
uuid.workspace = true

[[bin]]
name = "sip-softclient-windows"
path = "src/main.rs"

[lints]
workspace = true
