[package]
name = "client-core"
description = "Application core for USG SIP Soft Client"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = []
# Digest authentication with optional credential persistence
digest-auth = [
    "client-types/digest-auth",
    "client-sip-ua/digest-auth",
    "keyring",
    "uc-crypto",
    "hostname",
    "whoami",
]

[dependencies]
client-types = { path = "../client-types" }
client-sip-ua = { path = "../client-sip-ua" }
client-audio = { path = "../client-audio" }
proto-sip.workspace = true
proto-ice.workspace = true
serde.workspace = true
serde_json.workspace = true
toml.workspace = true
tokio.workspace = true
thiserror.workspace = true
tracing.workspace = true
chrono.workspace = true
zeroize.workspace = true
bytes.workspace = true

# TLS support
rustls.workspace = true
tokio-rustls = "0.26"
rustls-pki-types.workspace = true
rustls-native-certs.workspace = true

# Utilities
base64 = "0.22"

# Platform utilities
directories.workspace = true

# Secure credential storage (optional)
# Note: Platform-specific features are enabled via target-specific dependencies below
uc-crypto = { path = "../../uc/uc-crypto", optional = true }
hostname = { version = "0.4", optional = true }
whoami = { version = "1.5", optional = true }

# Windows smart card/PKI support + keyring with native backend
[target.'cfg(windows)'.dependencies]
windows.workspace = true
keyring = { version = "3", features = ["windows-native"], optional = true }

# macOS keychain/security support + keyring with native backend
[target.'cfg(target_os = "macos")'.dependencies]
security-framework = "3"
keyring = { version = "3", features = ["apple-native"], optional = true }

# Linux keyring with native backend (using Secret Service)
[target.'cfg(target_os = "linux")'.dependencies]
keyring = { version = "3", features = ["linux-native-sync-persistent", "crypto-rust"], optional = true }

# PKCS#11 for cross-platform smart card support (YubiKey, etc.)
[target.'cfg(any(target_os = "macos", target_os = "linux"))'.dependencies]
cryptoki = "0.7"

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
tempfile.workspace = true

[lints]
workspace = true
