[package]
name = "client-core"
description = "Application core for USG SIP Soft Client"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = []
digest-auth = ["client-types/digest-auth", "client-sip-ua/digest-auth"]

[dependencies]
client-types = { path = "../client-types" }
client-sip-ua = { path = "../client-sip-ua" }
client-audio = { path = "../client-audio" }
proto-sip.workspace = true
proto-ice.workspace = true
serde.workspace = true
serde_json.workspace = true
toml.workspace = true
tokio.workspace = true
thiserror.workspace = true
tracing.workspace = true
chrono.workspace = true
zeroize.workspace = true
bytes.workspace = true

# TLS support
rustls.workspace = true
tokio-rustls = "0.26"
rustls-pki-types.workspace = true
rustls-native-certs.workspace = true

# Utilities
base64 = "0.22"

# Platform utilities
directories.workspace = true

# Windows smart card/PKI support
[target.'cfg(windows)'.dependencies]
windows.workspace = true

# macOS keychain/security support
[target.'cfg(target_os = "macos")'.dependencies]
security-framework = "3"

# PKCS#11 for cross-platform smart card support (YubiKey, etc.)
[target.'cfg(any(target_os = "macos", target_os = "linux"))'.dependencies]
cryptoki = "0.7"

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
tempfile.workspace = true

[lints]
workspace = true
