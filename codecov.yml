# Codecov Configuration for USG Unified Communications
# https://docs.codecov.com/docs/codecov-yaml

coverage:
  # Set overall project coverage target (per CONTRIBUTING.md: 80% minimum)
  precision: 2
  round: down
  range: "60...100"

  status:
    project:
      default:
        target: 80%
        threshold: 2%
        if_ci_failed: error
    patch:
      default:
        target: 80%
        threshold: 5%

# Parse lcov format
parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

# Comment configuration for merge requests
comment:
  layout: "header, diff, flags, components"
  behavior: default
  require_changes: true
  require_base: false
  require_head: true

# Ignore certain paths from coverage
ignore:
  - "target/**/*"
  - "**/*_test.rs"
  - "**/tests/**"
  - "**/benches/**"
  - "**/examples/**"

# Flag management for different test types
flags:
  unit:
    paths:
      - crates/
    carryforward: true
